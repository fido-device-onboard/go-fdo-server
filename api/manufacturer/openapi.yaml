openapi: 3.0.0
info:
  title: FDO Manufacturer Server API
  version: 1.0.0
  description: |
    API for the FDO Manufacturer Server role. The Manufacturer Server is responsible
    for device initialization, creating ownership vouchers, and configuring rendezvous
    information for newly manufactured devices.

    This specification aggregates the following management APIs:
    - Ownership Voucher Management (/v1/vouchers)
    - Rendezvous Info Configuration (/v1/rvinfo)

    ## API Versioning
    This API uses semantic versioning (MAJOR.MINOR.PATCH) and includes the major
    version in the URL path (e.g., `/v1/vouchers`).

    - **MAJOR version** changes indicate breaking changes (incompatible API changes)
    - **MINOR version** changes add functionality in a backward-compatible manner
    - **PATCH version** changes are backward-compatible bug fixes

    ### Version Support Policy
    - The current major version (v1) is fully supported
    - When a new major version is released, the previous major version will be
      supported for a minimum of 12 months
    - Deprecated endpoints or fields will be marked in the documentation and
      supported for at least 6 months before removal
    - Deprecation notices will include the deprecation date, removal date, and
      migration guidance

    ### Breaking Changes
    Breaking changes that trigger a major version increment include:
    - Removing or renaming endpoints
    - Removing or renaming request/response fields
    - Changing field types or validation rules
    - Changing authentication mechanisms

    ## Pagination
    List operations support pagination using `offset` and `limit` query parameters:
    - `offset`: Number of items to skip (default: 0, minimum: 0)
    - `limit`: Maximum number of items to return (default: 100, minimum: 1, maximum: 1000)

    ## Rate Limiting
    API requests may be subject to rate limiting to ensure service stability.
    Rate limit information is provided in response headers when applicable:
    - `X-RateLimit-Limit`: Maximum requests allowed in the time window
    - `X-RateLimit-Remaining`: Remaining requests in the current window
    - `X-RateLimit-Reset`: Time when the rate limit resets (Unix timestamp)

    When rate limits are exceeded, the API returns a 429 Too Many Requests status code.
  contact:
    name: Go FDO Server API Support
    url: 'https://github.com/fido-device-onboard/go-fdo-server/issues'
paths:
  /health:
    get:
      operationId: GetHealth
      summary: Get server health status
      description: |
        Returns the server version and health status.

        Note: This endpoint does not require authentication and is intended
        for health checks by monitoring systems and load balancers.
      responses:
        '200':
          $ref: '#/components/responses/HealthStatus'
        '500':
          $ref: '#/components/responses/InternalServerError'
          examples:
            error:
              summary: Example of an unhealthy server
              value:
                message: database error
      tags:
        - health
  /v1/vouchers:
    get:
      operationId: ListVouchers
      summary: Query ownership vouchers (Deprecated)
      description: |
        Returns a list of ownership vouchers matching optional filter criteria.

        Results are ordered by updated_at timestamp in descending order.
        The CBOR field is omitted from results (use GET /vouchers/{guid} to retrieve full voucher).
      parameters:
        - name: guid
          in: query
          description: Filter by device GUID (hex-encoded)
          schema:
            type: string
            example: 3f4e5d6c7b8a9f0e1d2c3b4a5f6e7d8c
            pattern: '^[0-9a-fA-F]{32}$'
        - name: device_info
          in: query
          description: Filter by device info string
          schema:
            type: string
            example: MyDevice
      responses:
        '200':
          description: Successfully retrieved voucher list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VoucherMetadata'
              examples:
                emptyList:
                  summary: No vouchers found
                  value: []
                voucherList:
                  summary: List of vouchers
                  value:
                    - guid: 3f4e5d6c7b8a9f0e1d2c3b4a5f6e7d8c
                      device_info: Device 1
                      created_at: '2024-01-15T10:30:00Z'
                      updated_at: '2024-01-15T10:30:00Z'
                    - guid: a1b2c3d4e5f6789012345678abcdef01
                      device_info: Device 2
                      created_at: '2024-01-14T09:20:00Z'
                      updated_at: '2024-01-14T09:20:00Z'
        '400':
          description: Invalid query parameters
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              example: 'Invalid GUID: xyz'
        '500':
          description: Internal server error occurred while querying vouchers
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
      tags:
        - vouchers
    post:
      operationId: InsertVoucher
      summary: Insert ownership voucher(s) (Deprecated)
      description: |
        Inserts one or more ownership vouchers into the database.

        The request body should contain PEM-encoded ownership voucher(s).
        Each voucher is verified for:
        - Ownership (voucher owner key matches server's configured keys)
        - Cryptographic integrity (signature chain, certificate chains, etc.)
        - Protocol version and header field validity

        Duplicate vouchers (same GUID with same CBOR data) are silently skipped.
        Existing vouchers (same GUID with different CBOR data) are not overwritten and are silently skipped.

        The operation succeeds (200 OK) even if all vouchers were duplicates/skipped.
      requestBody:
        description: PEM-encoded ownership voucher(s)
        required: true
        content:
          application/x-pem-file:
            schema:
              type: string
              format: binary
            example: |
              -----BEGIN OWNERSHIP VOUCHER-----
              [base64-encoded CBOR data]
              -----END OWNERSHIP VOUCHER-----
      responses:
        '200':
          description: Voucher(s) successfully inserted or were duplicates
          content:
            text/plain:
              schema:
                type: string
                example: ''
        '400':
          description: Invalid voucher data or verification failed
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              examples:
                decodeCborError:
                  summary: Unable to decode CBOR
                  value: Unable to decode cbor
                invalidVoucher:
                  summary: Voucher verification failed
                  value: Invalid ownership voucher
                decodePemError:
                  summary: Unable to decode PEM
                  value: Unable to decode PEM content
        '500':
          description: Internal server error occurred while inserting voucher
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              examples:
                readBodyError:
                  summary: Error reading request body
                  value: Failure to read the request body
                insertError:
                  summary: Error inserting into database
                  value: Internal server error
      tags:
        - vouchers
  '/v1/vouchers/{guid}':
    get:
      operationId: GetVoucherByGUID
      summary: Get ownership voucher by GUID (Deprecated)
      description: |
        Retrieves a specific ownership voucher by its device GUID.

        Returns the voucher in PEM format with full CBOR data.
      parameters:
        - name: guid
          in: path
          description: 'Device GUID (hex-encoded, 32 characters)'
          required: true
          schema:
            type: string
            example: 3f4e5d6c7b8a9f0e1d2c3b4a5f6e7d8c
            pattern: '^[0-9a-fA-F]{32}$'
      responses:
        '200':
          description: Successfully retrieved the ownership voucher
          content:
            application/x-pem-file:
              schema:
                type: string
                format: binary
              example: |
                -----BEGIN OWNERSHIP VOUCHER-----
                [base64-encoded CBOR data]
                -----END OWNERSHIP VOUCHER-----
        '400':
          description: Invalid GUID format
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              examples:
                invalidGuid:
                  summary: Invalid GUID
                  value: Invalid GUID
                invalidFormat:
                  summary: Invalid GUID format
                  value: Invalid GUID format
        '404':
          description: Voucher not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              example: Voucher not found
        '500':
          description: Internal server error occurred
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
      tags:
        - vouchers
  /v1/rvinfo:
    get:
      operationId: GetRendezvousInfo
      summary: Get the current RendezvousInfo (Deprecated)
      description: Retrieves the current rendezvous information configuration that devices will use to connect to the rendezvous server.
      responses:
        '200':
          description: Successfully retrieved the RendezvousInfo configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVInfo'
              examples:
                simpleHttpRendezvous:
                  summary: Simple HTTP rendezvous configuration
                  value:
                    - dns: rendezvous.example.com
                      protocol: http
                      owner_port: '8080'
                httpsRendezvousWithCertHash:
                  summary: HTTPS rendezvous with certificate hash validation
                  value:
                    - dns: rv.example.com
                      protocol: https
                      owner_port: '8443'
                      sv_cert_hash: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789abcdef01
                multipleRendezvousServers:
                  summary: Multiple rendezvous servers with fallback
                  value:
                    - dns: rv-primary.example.com
                      protocol: https
                      owner_port: '8443'
                    - dns: rv-fallback.example.com
                      protocol: https
                      owner_port: '8443'
                      delay_seconds: 30
        '404':
          description: No RendezvousInfo configuration has been created yet.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              example: No rvInfo found
        '500':
          description: Internal server error occurred while fetching the configuration.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              example: Error fetching rvInfo
      tags:
        - rvinfo
    post:
      operationId: CreateRendezvousInfo
      summary: Create the RendezvousInfo configuration (Deprecated)
      description: |
        Creates the rendezvous information configuration.

        This operation will fail if a configuration already exists. Use PUT to update an existing configuration.
      requestBody:
        description: The new RendezvousInfo configuration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RVInfo'
            examples:
              createHttps:
                summary: Create HTTPS rendezvous
                value:
                  - dns: rv-new.example.com
                    protocol: https
                    owner_port: '8443'
              createMultipleServers:
                summary: Create with primary and fallback servers
                value:
                  - dns: rv-primary.example.com
                    protocol: https
                    owner_port: '8443'
                  - dns: rv-fallback.example.com
                    protocol: https
                    owner_port: '8443'
                    delay_seconds: 60
      responses:
        '201':
          description: Successfully created the RendezvousInfo configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVInfo'
              examples:
                createdHttpsConfiguration:
                  summary: Successfully created HTTPS configuration
                  value:
                    - dns: rv-new.example.com
                      protocol: https
                      owner_port: '8443'
        '400':
          description: Invalid RendezvousInfo configuration provided in the request body.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              example: Invalid rvInfo
        '409':
          description: RendezvousInfo configuration already exists. Use PUT to update instead.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              example: rvInfo already exists
        '500':
          description: Internal server error occurred while creating the configuration.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              examples:
                readError:
                  summary: Error reading request body
                  value: Error reading body
                insertError:
                  summary: Error inserting into database
                  value: Error inserting rvInfo
      tags:
        - rvinfo
    put:
      operationId: UpdateRendezvousInfo
      summary: Update the RendezvousInfo configuration (Deprecated)
      description: |
        Updates the rendezvous information configuration.

        This operation will fail if no configuration exists. Use POST to create a new configuration.
        The new configuration will be used by newly manufactured or initialized devices.
        Existing devices will continue using their current rendezvous information.
      requestBody:
        description: The updated RendezvousInfo configuration
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RVInfo'
            examples:
              updateToHttps:
                summary: Update to HTTPS rendezvous
                value:
                  - dns: rv-secure.example.com
                    protocol: https
                    owner_port: '8443'
              updateWithMultipleServers:
                summary: Update with primary and fallback servers
                value:
                  - dns: rv-primary.example.com
                    protocol: https
                    owner_port: '8443'
                  - dns: rv-fallback.example.com
                    protocol: https
                    owner_port: '8443'
                    delay_seconds: 60
      responses:
        '200':
          description: Successfully updated the RendezvousInfo configuration.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVInfo'
              examples:
                updatedHttpsConfiguration:
                  summary: Successfully updated to HTTPS configuration
                  value:
                    - dns: rv-secure.example.com
                      protocol: https
                      owner_port: '8443'
        '400':
          description: Invalid RendezvousInfo configuration provided in the request body.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              example: Invalid rvInfo
        '404':
          description: RendezvousInfo configuration does not exist. Use POST to create it first.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              example: rvInfo does not exist
        '500':
          description: Internal server error occurred while updating the configuration.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorString'
              examples:
                readError:
                  summary: Error reading request body
                  value: Error reading body
                updateError:
                  summary: Error updating in database
                  value: Error updating rvInfo
      tags:
        - rvinfo
  /v2/rvinfo:
    get:
      operationId: GetRendezvousInfo
      summary: Get the current RendezvousInfo
      description: Retrieves the current rendezvous information configuration that devices will use to connect to the rendezvous server. Returns an empty array if no configuration has been set.
      responses:
        '200':
          description: Successfully retrieved the RendezvousInfo configuration. Returns an empty array if no configuration has been set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVInfo1'
              examples:
                simpleHttpRendezvous:
                  summary: Simple HTTP rendezvous configuration
                  value:
                    - - dns: rendezvous.example.com
                      - protocol: http
                      - owner_port: 8080
                httpsRendezvousWithCertHash:
                  summary: HTTPS rendezvous with certificate hash validation
                  value:
                    - - dns: rv.example.com
                      - protocol: https
                      - owner_port: 8443
                      - sv_cert_hash: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789abcdef01
                multipleRendezvousServers:
                  summary: Multiple rendezvous servers with fallback
                  value:
                    - - dns: rv-primary.example.com
                      - protocol: https
                      - owner_port: 8443
                    - - dns: rv-fallback.example.com
                      - protocol: https
                      - owner_port: 8443
                      - delay_seconds: 30
                wifiConfiguration:
                  summary: WiFi rendezvous configuration
                  value:
                    - - medium: wifi_all
                      - wifi_ssid: FDO-Network
                      - wifi_pw: SecurePassword123
                      - dns: rv.local.network
                      - protocol: http
                      - owner_port: 8080
                ipBasedRendezvous:
                  summary: IP-based rendezvous (no DNS)
                  value:
                    - - ip: 192.168.1.100
                      - protocol: https
                      - owner_port: 8443
                bypassRendezvous:
                  summary: Direct owner connection bypassing rendezvous
                  description: Used for direct device-to-owner connections without rendezvous server
                  value:
                    - - dns: owner.example.com
                      - protocol: https
                      - owner_port: 8443
                      - rv_bypass: true
                emptyConfiguration:
                  summary: No configuration set
                  value: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - rvinfo
    put:
      operationId: UpdateRendezvousInfo
      summary: Update the RendezvousInfo
      description: |
        Updates the rendezvous information configuration.

        The new configuration will be used by newly manufactured or initialized devices.
        Existing devices will continue using their current rendezvous information.
      requestBody:
        description: Set the RendezvousInfo
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RVInfo1'
            examples:
              updateToHttps:
                summary: Update to HTTPS rendezvous
                value:
                  - - dns: rv-secure.example.com
                    - protocol: https
                    - owner_port: 8443
                    - sv_cert_hash: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789abcdef01
              updateWithMultipleServers:
                summary: Update with primary and fallback servers
                value:
                  - - dns: rv-primary.example.com
                    - protocol: https
                    - owner_port: 8443
                  - - dns: rv-fallback.example.com
                    - protocol: https
                    - owner_port: 8443
                    - delay_seconds: 60
              updateToLocalWifi:
                summary: Update to local WiFi configuration
                value:
                  - - medium: wifi_all
                    - wifi_ssid: FactoryNetwork
                    - wifi_pw: Factory2024!
                    - dns: rv.local
                    - protocol: http
                    - owner_port: 8080
              updateToBypassRendezvous:
                summary: Update to bypass rendezvous (direct owner connection)
                value:
                  - - dns: owner-direct.example.com
                    - protocol: https
                    - owner_port: 8443
                    - rv_bypass: true
      responses:
        '200':
          description: Returns the new RendezvousInfo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVInfo1'
              examples:
                updatedHttpsConfiguration:
                  summary: Successfully updated to HTTPS configuration
                  value:
                    - - dns: rv-secure.example.com
                      - protocol: https
                      - owner_port: 8443
                      - sv_cert_hash: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789abcdef01
                updatedMultiServerConfiguration:
                  summary: Successfully updated with multiple servers
                  value:
                    - - dns: rv-primary.example.com
                      - protocol: https
                      - owner_port: 8443
                    - - dns: rv-fallback.example.com
                      - protocol: https
                      - owner_port: 8443
                      - delay_seconds: 60
                updatedBypassConfiguration:
                  summary: Successfully updated to bypass rendezvous
                  value:
                    - - dns: owner-direct.example.com
                      - protocol: https
                      - owner_port: 8443
                      - rv_bypass: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - rvinfo
    delete:
      operationId: DeleteRendezvousInfo
      summary: Delete the RendezvousInfo
      description: |
        Deletes the current rendezvous information configuration.

        After deletion, devices will not have rendezvous information available
        until a new configuration is set via PUT. Returns the deleted
        configuration, or an empty array if no configuration was set.
      responses:
        '200':
          description: Successfully deleted the RendezvousInfo configuration. Returns the deleted configuration or an empty array if nothing was configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RVInfo1'
              examples:
                deletedHttpsConfiguration:
                  summary: Deleted HTTPS rendezvous configuration
                  value:
                    - - dns: rv-secure.example.com
                      - protocol: https
                      - owner_port: 8443
                deletedMultiServerConfiguration:
                  summary: Deleted multi-server configuration
                  value:
                    - - dns: rv-primary.example.com
                      - protocol: https
                      - owner_port: 8443
                    - - dns: rv-fallback.example.com
                      - protocol: https
                      - owner_port: 8443
                      - delay_seconds: 60
                noConfigurationToDelete:
                  summary: No configuration was set
                  value: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
        - rvinfo
components:
  schemas:
    Health:
      type: object
      properties:
        version:
          description: The server version
          type: string
          example: 0.0.1
        status:
          description: The server health status
          type: string
          example: OK
        message:
          description: Human-readable status message or error description
          type: string
          example: the service is up and running
      required:
        - version
        - status
        - message
    Error:
      type: object
      properties:
        message:
          description: A human-readable error message.
          type: string
      required:
        - message
    VoucherMetadata:
      description: Ownership voucher metadata (excludes CBOR data)
      type: object
      properties:
        guid:
          description: Device GUID (hex-encoded)
          type: string
          example: 3f4e5d6c7b8a9f0e1d2c3b4a5f6e7d8c
        device_info:
          description: Device information string
          type: string
          example: Intel NUC Model XYZ
        created_at:
          description: Timestamp when voucher was first inserted
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updated_at:
          description: Timestamp when voucher was last updated
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
      required:
        - guid
        - device_info
        - created_at
        - updated_at
    ErrorString:
      description: A human-readable error message.
      type: string
    DNSHostname:
      type: string
      format: hostname
      example: rendezvous.example.com
    IPv4Address:
      type: string
      format: ipv4
      example: 192.168.1.100
    ProtocolType:
      description: |
        Protocol to use for communication:
        - `rest` - RESTful HTTP/HTTPS
        - `http` - HTTP protocol
        - `https` - HTTPS protocol (recommended for production)
        - `tcp` - Raw TCP connection
        - `tls` - TLS-secured TCP connection
        - `coap+tcp` - CoAP over TCP
        - `coap` - Constrained Application Protocol
      type: string
      example: https
      enum:
        - rest
        - http
        - https
        - tcp
        - tls
        - coap+tcp
        - coap
    PortString:
      type: string
      example: '8443'
    RVDirective:
      description: |
        A single rendezvous directive containing connection parameters.
        At least one of `dns` or `ip` must be specified.
      type: object
      properties:
        dns:
          description: DNS hostname for the server
          $ref: '#/components/schemas/DNSHostname'
        ip:
          description: IPv4 address for the server
          $ref: '#/components/schemas/IPv4Address'
        protocol:
          description: Communication protocol specification
          $ref: '#/components/schemas/ProtocolType'
        medium:
          description: |
            Network medium/interface to use for communication.
            Options: eth_all, wifi_all
          type: string
          example: wifi_all
          enum:
            - eth_all
            - wifi_all
        device_port:
          description: Port number on the device side
          $ref: '#/components/schemas/PortString'
        owner_port:
          description: Port number on the owner/server side
          $ref: '#/components/schemas/PortString'
        wifi_ssid:
          description: WiFi network SSID (Service Set Identifier)
          type: string
          example: FDO-Network
          maxLength: 32
          minLength: 1
        wifi_pw:
          description: WiFi network password
          type: string
          format: password
          example: SecurePassword123
        dev_only:
          description: Instruction applies to device only (not owner)
          type: boolean
          example: true
        owner_only:
          description: Instruction applies to owner only (not device)
          type: boolean
          example: true
        rv_bypass:
          description: Bypass rendezvous server and connect directly to owner
          type: boolean
          example: true
        delay_seconds:
          description: Delay in seconds before attempting connection (with up to 25% randomization)
          type: integer
          format: uint32
          example: 30
          minimum: 0
        sv_cert_hash:
          description: Server certificate hash for validation (SHA-256 or SHA-384 hex string)
          type: string
          example: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789abcdef01
          pattern: '^[a-fA-F0-9]{64}$|^[a-fA-F0-9]{96}$'
        cl_cert_hash:
          description: Client certificate hash for validation (SHA-256 or SHA-384 hex string)
          type: string
          example: b2c3d4e5f6a78901234567890abcdef1b2c3d4e5f6a78901234567890abcdef1
          pattern: '^[a-fA-F0-9]{64}$|^[a-fA-F0-9]{96}$'
        user_input:
          description: User input configuration
          type: string
          example: prompt
        ext_rv:
          description: Extended rendezvous information for custom device-specific instructions
          type: string
          example: custom-data
      example:
        dns: rendezvous.example.com
        protocol: https
        owner_port: '8443'
        device_port: '8041'
    RVInfo:
      description: |
        Rendezvous information array containing one or more rendezvous directive objects.
        Each object contains fields that guide devices and owners on how to connect to
        the rendezvous server, including network configuration, protocols, and connection parameters.

        Processing behavior (FDO specification section 3.7):
        - Directives are processed in order (index 0 first, then 1, etc.)
        - The first successful connection to a rendezvous server MAY be used
        - Multiple directives provide fallback options for device connectivity
        - At least one of `dns` or `ip` must be specified for each directive

        Format: Array of objects with flat key-value pairs (legacy v1 format for backward compatibility).
      type: array
      items:
        $ref: '#/components/schemas/RVDirective'
      example:
        - dns: rendezvous.example.com
          protocol: https
          owner_port: '8443'
        - dns: rv-fallback.example.com
          protocol: https
          owner_port: '8443'
          delay_seconds: 30
    DNSHostname1:
      type: string
      format: hostname
      example: rendezvous.example.com
    DNS:
      description: DNS hostname for the server
      type: object
      properties:
        dns:
          $ref: '#/components/schemas/DNSHostname1'
      example:
        dns: rendezvous.example.com
    IPv4Address1:
      type: string
      format: ipv4
      example: 192.168.1.100
    IP:
      description: IPv4 address for the server
      type: object
      properties:
        ip:
          $ref: '#/components/schemas/IPv4Address1'
      example:
        ip: 192.168.1.100
    ProtocolType1:
      description: |
        Protocol to use for communication:
        - `rest` - RESTful HTTP/HTTPS
        - `http` - HTTP protocol
        - `https` - HTTPS protocol (recommended for production)
        - `tcp` - Raw TCP connection
        - `tls` - TLS-secured TCP connection
        - `coap+tcp` - CoAP over TCP
        - `coap` - Constrained Application Protocol
      type: string
      example: https
      enum:
        - rest
        - http
        - https
        - tcp
        - tls
        - coap+tcp
        - coap
    Protocol:
      description: Communication protocol specification
      type: object
      properties:
        protocol:
          $ref: '#/components/schemas/ProtocolType1'
      example:
        protocol: https
    Medium:
      description: |
        Network medium/interface to use for communication:
        - `wired_1` through `wired_9` - Specific wired network interfaces
        - `wifi_1` through `wifi_9` - Specific WiFi network interfaces
        - `wired_all` - Any available wired interface
        - `wifi_all` - Any available WiFi interface
      type: object
      properties:
        medium:
          type: string
          enum:
            - wired_1
            - wired_2
            - wired_3
            - wired_4
            - wired_5
            - wired_6
            - wired_7
            - wired_8
            - wired_9
            - wifi_1
            - wifi_2
            - wifi_3
            - wifi_4
            - wifi_5
            - wifi_6
            - wifi_7
            - wifi_8
            - wifi_9
            - wired_all
            - wifi_all
      example:
        medium: wifi_all
    PortNumber:
      type: integer
      example: 8443
      maximum: 65535
      minimum: 1
    DevicePort:
      description: Port number on the device side
      type: object
      properties:
        device_port:
          $ref: '#/components/schemas/PortNumber'
      example:
        device_port: 8080
    OwnerPort:
      description: Port number on the owner/server side
      type: object
      properties:
        owner_port:
          $ref: '#/components/schemas/PortNumber'
      example:
        owner_port: 8443
    WifiSSID:
      description: WiFi network SSID (Service Set Identifier)
      type: object
      properties:
        wifi_ssid:
          type: string
          maxLength: 32
          minLength: 1
      example:
        wifi_ssid: FDO-Network
    WifiPW:
      description: WiFi network password
      type: object
      properties:
        wifi_pw:
          type: string
          format: password
      example:
        wifi_pw: SecurePassword123
    DevOnly:
      description: Instruction applies to device only (not owner)
      type: object
      properties:
        dev_only:
          type: boolean
      example:
        dev_only: true
    OwnerOnly:
      description: Instruction applies to owner only (not device)
      type: object
      properties:
        owner_only:
          type: boolean
      example:
        owner_only: true
    RVBypass:
      description: Bypass rendezvous server and connect directly to owner
      type: object
      properties:
        rv_bypass:
          type: boolean
      example:
        rv_bypass: true
    DelaySeconds:
      description: Delay in seconds before attempting connection (with up to 25% randomization)
      type: object
      properties:
        delay_seconds:
          type: integer
          format: int32
          minimum: 0
      example:
        delay_seconds: 30
    SvCertHash:
      description: Server certificate hash for validation (SHA-256 or SHA-384)
      type: object
      properties:
        sv_cert_hash:
          type: string
          pattern: '^[a-fA-F0-9]{64}$|^[a-fA-F0-9]{96}$'
      example:
        sv_cert_hash: a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789abcdef01
    ClCertHash:
      description: Client certificate hash for validation (SHA-256 or SHA-384)
      type: object
      properties:
        cl_cert_hash:
          type: string
          pattern: '^[a-fA-F0-9]{64}$|^[a-fA-F0-9]{96}$'
      example:
        cl_cert_hash: b2c3d4e5f6a78901234567890abcdef1b2c3d4e5f6a78901234567890abcdef1
    UserInput:
      description: Indicates whether user input is allowed to update rendezvous variables during device onboarding
      type: object
      properties:
        user_input:
          type: boolean
      example:
        user_input: true
    ExtRV:
      description: Extended rendezvous information for custom device-specific instructions
      type: object
      properties:
        ext_rv:
          type: array
          items:
            type: string
      example:
        ext_rv:
          - custom-instruction-1
          - custom-instruction-2
    RVInstruction:
      type: array
      items:
        anyOf:
          - $ref: '#/components/schemas/DNS'
          - $ref: '#/components/schemas/IP'
          - $ref: '#/components/schemas/Protocol'
          - $ref: '#/components/schemas/Medium'
          - $ref: '#/components/schemas/DevicePort'
          - $ref: '#/components/schemas/OwnerPort'
          - $ref: '#/components/schemas/WifiSSID'
          - $ref: '#/components/schemas/WifiPW'
          - $ref: '#/components/schemas/DevOnly'
          - $ref: '#/components/schemas/OwnerOnly'
          - $ref: '#/components/schemas/RVBypass'
          - $ref: '#/components/schemas/DelaySeconds'
          - $ref: '#/components/schemas/SvCertHash'
          - $ref: '#/components/schemas/ClCertHash'
          - $ref: '#/components/schemas/UserInput'
          - $ref: '#/components/schemas/ExtRV'
    RVInfo1:
      description: |
        Rendezvous information array containing one or more instruction sets
        (RendezvousDirective). Each instruction set guides devices and owners on how
        to connect to the rendezvous server, including network configuration, protocols,
        and connection parameters.

        Processing behavior (FDO specification section 3.7):
        - Instruction sets are processed in order (index 0 first, then 1, etc.)
        - The first successful connection to a rendezvous server MAY be used
        - All DNS addresses within an instruction set MUST be processed before
          moving to the next instruction set
        - Multiple instruction sets provide fallback options for device connectivity
        - Devices and owners may avoid redundant operations (e.g., contacting the
          same IP address twice)
      type: array
      items:
        $ref: '#/components/schemas/RVInstruction'
  responses:
    HealthStatus:
      description: Server health status
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Health'
          examples:
            healthy:
              summary: Example of a healthy server
              value:
                version: 0.0.1
                status: OK
                message: the service is up and running
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            serverError:
              summary: Example of a server error
              value:
                message: An unexpected error occurred.
    Unauthorized:
      description: 'Unauthorized - Authentication credentials missing, invalid, or expired.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unauthorized:
              summary: Example of an unauthorized error
              value:
                message: Authentication token is invalid or has expired.
    Forbidden:
      description: Forbidden - The authenticated user does not have permission to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            forbidden:
              summary: Example of a forbidden error
              value:
                message: User does not have the right access level.
    BadRequest:
      description: Bad Request - The request was malformed or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            badRequest:
              summary: Example of a bad request error
              value:
                message: Invalid Request.
tags:
  - name: health
    description: Server's health monitoring
  - name: rvinfo
    description: Operations related to rendezvous info management
  - name: voucher
    description: Operations related to ownership voucher management
