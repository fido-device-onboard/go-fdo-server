openapi: 3.0.0
info:
  title: Common API Objects
  version: 1.1.0
  description: Common components, schemas, security definitions, and reusable response objects used across all FDO server APIs.
  contact:
    name: Go FDO Server API Support
    url: https://github.com/fido-device-onboard/go-fdo-server/issues
components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic Authentication using username and password.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer Token authentication. The token can be a JWT or an opaque token.
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Key authentication via the X-API-Key header.
    OidcAuth:
      type: openIdConnect
      openIdConnectUrl: https://auth.example.com/realms/fdo/.well-known/openid-configuration
      description: OpenID Connect authentication using a JWT obtained from an OIDC provider. The openIdConnectUrl should be configured to point to your OIDC provider's discovery endpoint.
    Oauth2Auth:
      type: oauth2
      description: OAuth 2.0 authentication. The tokenUrl should be configured to point to your OAuth2 provider's token endpoint.
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/realms/fdo/protocol/openid-connect/token
          scopes:
            'read:device-ca-certs': "Grants read access to trusted device CA certificates."
            'write:device-ca-certs': "Grants create, update, and delete access to trusted device CA certificates."
  schemas:
    ErrorString:
      type: string
      description: A human-readable error message.
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: A human-readable error message.
    DNSHostname:
      type: string
      format: hostname
      example: 'rendezvous.example.com'
    IPv4Address:
      type: string
      format: ipv4
      example: '192.168.1.100'
    ProtocolType:
      type: string
      description: |
        Protocol to use for communication:
        - `rest` - RESTful HTTP/HTTPS
        - `http` - HTTP protocol
        - `https` - HTTPS protocol (recommended for production)
        - `tcp` - Raw TCP connection
        - `tls` - TLS-secured TCP connection
        - `coap+tcp` - CoAP over TCP
        - `coap` - Constrained Application Protocol
      enum:
        - "rest"
        - "http"
        - "https"
        - "tcp"
        - "tls"
        - "coap+tcp"
        - "coap"
      example: 'https'
    PortNumber:
      type: integer
      minimum: 1
      maximum: 65535
      example: 8443
    PortString:
      type: string
      example: "8443"
    RVInfo:
      type: array
      description: |
        Rendezvous information array containing one or more rendezvous directive objects.
        Each object contains fields that guide devices and owners on how to connect to
        the rendezvous server, including network configuration, protocols, and connection parameters.

        Processing behavior (FDO specification section 3.7):
        - Directives are processed in order (index 0 first, then 1, etc.)
        - The first successful connection to a rendezvous server MAY be used
        - Multiple directives provide fallback options for device connectivity
        - At least one of `dns` or `ip` must be specified for each directive

        Format: Array of objects with flat key-value pairs (legacy v1 format for backward compatibility).
      items:
        $ref: "#/components/schemas/RVDirective"
      example:
        - dns: 'rendezvous.example.com'
          protocol: 'https'
          owner_port: '8443'
        - dns: 'rv-fallback.example.com'
          protocol: 'https'
          owner_port: '8443'
          delay_seconds: 30
    RVDirective:
      type: object
      description: |
        A single rendezvous directive containing connection parameters.
        At least one of `dns` or `ip` must be specified.
      properties:
        dns:
          $ref: "#/components/schemas/DNSHostname"
          description: DNS hostname for the server
        ip:
          $ref: "#/components/schemas/IPv4Address"
          description: IPv4 address for the server
        protocol:
          $ref: "#/components/schemas/ProtocolType"
          description: Communication protocol specification
        medium:
          type: string
          description: |
            Network medium/interface to use for communication.
            Options: eth_all, wifi_all
          enum:
            - "eth_all"
            - "wifi_all"
          example: 'wifi_all'
        device_port:
          $ref: "#/components/schemas/PortString"
          description: Port number on the device side
        owner_port:
          $ref: "#/components/schemas/PortString"
          description: Port number on the owner/server side
        wifi_ssid:
          type: string
          minLength: 1
          maxLength: 32
          description: WiFi network SSID (Service Set Identifier)
          example: 'FDO-Network'
        wifi_pw:
          type: string
          format: password
          description: WiFi network password
          example: 'SecurePassword123'
        dev_only:
          type: boolean
          description: Instruction applies to device only (not owner)
          example: true
        owner_only:
          type: boolean
          description: Instruction applies to owner only (not device)
          example: true
        rv_bypass:
          type: boolean
          description: Bypass rendezvous server and connect directly to owner
          example: true
        delay_seconds:
          type: integer
          format: uint32
          minimum: 0
          description: Delay in seconds before attempting connection (with up to 25% randomization)
          example: 30
        sv_cert_hash:
          type: string
          pattern: '^[a-fA-F0-9]{64}$|^[a-fA-F0-9]{96}$'
          description: Server certificate hash for validation (SHA-256 or SHA-384 hex string)
          example: 'a1b2c3d4e5f6789012345678abcdef0123456789abcdef0123456789abcdef01'
        cl_cert_hash:
          type: string
          pattern: '^[a-fA-F0-9]{64}$|^[a-fA-F0-9]{96}$'
          description: Client certificate hash for validation (SHA-256 or SHA-384 hex string)
          example: 'b2c3d4e5f6a78901234567890abcdef1b2c3d4e5f6a78901234567890abcdef1'
        user_input:
          type: string
          description: User input configuration
          example: 'prompt'
        ext_rv:
          type: string
          description: Extended rendezvous information for custom device-specific instructions
          example: 'custom-data'
      example:
        dns: 'rendezvous.example.com'
        protocol: 'https'
        owner_port: '8443'
        device_port: '8041'
  responses:
    BadRequest:
      description: Bad Request - The request was malformed or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            badRequest:
              summary: Example of a bad request error
              value:
                message: "Invalid Request."
    Unauthorized:
      description: Unauthorized - Authentication credentials missing, invalid, or expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unauthorized:
              summary: Example of an unauthorized error
              value:
                message: "Authentication token is invalid or has expired."
    Forbidden:
      description: Forbidden - The authenticated user does not have permission to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            forbidden:
              summary: Example of a forbidden error
              value:
                message: "User does not have the right access level."
    NotFound:
      description: Not Found - The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            notFound:
              summary: Example of a not found error
              value:
                message: "Object not found."
    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            serverError:
              summary: Example of a server error
              value:
                message: "An unexpected error occurred."
